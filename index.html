<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crossing | 战略法典</title>
    <style>
        :root { --gold: #e6b17a; --bg: #0a0a0a; --card: #1a1a1a; --text: #ddd; --accent: #e6b17a; }
        /* 深夜里模式样式 */
        body.midnight-mode { --bg: #1a0505; --card: #2d0a0a; --gold: #999; --accent: #ff4444; }
        
        body { 
            background: var(--bg); color: var(--text); font-family: -apple-system, "Noto Sans SC", serif; 
            margin: 0; padding: 0; transition: background 2s;
        }

        .container { width: 92%; max-width: 500px; margin: 0 auto; padding: 40px 0 120px 0; }
        header { text-align: center; margin-bottom: 40px; }
        h1 { font-size: 2.8rem; letter-spacing: 10px; color: var(--accent); margin: 0; font-weight: 300; }
        .intro-text { font-size: 14px; color: #666; margin-top: 15px; letter-spacing: 2px; }

        .step-box { 
            background: var(--card); border: 1px solid #2a2a2a; border-radius: 28px;
            padding: 30px 20px; margin-bottom: 25px; box-sizing: border-box;
        }
        .step-num { color: var(--accent); font-size: 11px; font-weight: bold; margin-bottom: 12px; display: block; opacity: 0.6; }
        .step-title { font-size: 18px; margin-bottom: 20px; color: #fff; text-align: left; }

        .path-group { display: flex; gap: 12px; }
        .path-btn { 
            flex: 1; padding: 18px 5px; border: 1px solid #333; border-radius: 16px; 
            background: #111; color: #777; font-size: 14px; cursor: pointer; transition: 0.3s;
        }
        .path-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(255,68,68,0.1); }

        .god-scroll { display: flex; overflow-x: auto; gap: 15px; padding-bottom: 15px; scrollbar-width: none; }
        .god-card { 
            min-width: 160px; padding: 20px 10px; background: #111; border: 1px solid #333; border-radius: 20px; 
            text-align: center; transition: 0.4s; flex-shrink: 0; position: relative;
        }
        .god-card.active { border-color: var(--accent); background: rgba(255,68,68,0.08); transform: translateY(-5px); }
        .god-img-wrap { width: 70px; height: 70px; border-radius: 50%; border: 2px solid #333; margin: 0 auto 15px auto; overflow: hidden; }
        .god-img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); }
        .god-name { font-size: 17px; font-weight: bold; margin-bottom: 8px; color: var(--accent); }
        .god-tag { font-size: 11px; color: #555; }

        input[type=range] { width: 100%; height: 3px; background: #333; appearance: none; outline: none; }
        input[type=range]::-webkit-slider-thumb { appearance: none; width: 22px; height: 22px; background: var(--accent); border-radius: 50%; border: 4px solid #000; }

        .footer-action { 
            position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(10,10,10,0.9);
            backdrop-filter: blur(15px); padding: 20px 0; border-top: 1px solid #222; text-align: center; z-index: 100;
        }
        #table-num { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; color: var(--accent); text-align: center; font-size: 18px; padding: 12px; width: 100px; margin-right: 10px; }
        #submit-btn { padding: 15px 35px; border-radius: 12px; border: none; background: var(--accent); color: #000; font-size: 17px; font-weight: bold; cursor: pointer; }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
        .poster-container { width: 85%; max-width: 350px; }
        #poster-img { width: 100%; border-radius: 15px; box-shadow: 0 0 30px rgba(255,68,68,0.2); }
    </style>
</head>
<body id="body-tag">

<div class="container">
    <header>
        <h1 id="main-title">CROSSING</h1>
        <div id="sub-title" class="intro-text">意志即配方 · 调配你的战略契约</div>
    </header>

    <div class="step-box">
        <span class="step-num">STEP 01. PATH</span>
        <div class="step-title">请设定今日意图：</div>
        <div class="path-group">
            <button class="path-btn active" id="btn-oracle" onclick="setPath('oracle', this)">✧ 寻求神谕</button>
            <button class="path-btn" id="btn-ritual" onclick="setPath('ritual', this)">❂ 开启仪式</button>
        </div>
    </div>

    <div class="step-box">
        <span class="step-num">STEP 02. LINKAGE</span>
        <div class="step-title">选择对应的原型力量：</div>
        <div class="god-scroll">
            <div class="god-card active" id="card-hekate" onclick="selectGod('Hekate')">
                <div class="god-img-wrap"><img src="hekate.jpg" class="god-img"></div>
                <div class="god-name" id="name-hekate">HEKATE</div>
                <div class="god-tag" id="tag-hekate">守护 / 路径 / 驱邪</div>
            </div>
            <div class="god-card" id="card-cyprian" onclick="selectGod('St. Cyprian')">
                <div class="god-img-wrap"><img src="cyprian.jpg" class="god-img"></div>
                <div class="god-name" id="name-cyprian">ST. CYPRIAN</div>
                <div class="god-tag" id="tag-cyprian">财富 / 契约 / 事业</div>
            </div>
            <div class="god-card" id="card-aphrodite" onclick="selectGod('Aphrodite')">
                <div class="god-img-wrap"><img src="aphrodite.jpg" class="god-img"></div>
                <div class="god-name" id="name-aphrodite">APHRODITE</div>
                <div class="god-tag" id="tag-aphrodite">魅力 / 爱情 / 联结</div>
            </div>
        </div>
    </div>

    <div class="step-box">
        <span class="step-num">STEP 03. ELEMENTS</span>
        <div class="step-title">调整风味比例：</div>
        <div class="slider-item">
            <input type="range" id="acid" min="0" max="100" value="50" oninput="upd(this)">
        </div>
        <div class="slider-item">
            <input type="range" id="strength" min="0" max="100" value="50" oninput="upd(this)">
        </div>
        <p style="font-size: 10px; color: #444; text-align: center;">深夜模式下比例将产生不可控偏移</p>
    </div>
</div>

<div class="footer-action">
    <input type="text" id="table-num" placeholder="桌号">
    <button id="submit-btn" onclick="execute()">开启仪式</button>
</div>

<div id="poster-overlay" class="overlay">
    <div class="poster-container">
        <canvas id="canvas-poster" width="600" height="900" style="display:none;"></canvas>
        <img id="poster-img" src="">
        <button onclick="location.reload()" style="margin-top:20px; background:transparent; border:1px solid #444; color:#888; padding:8px 20px; border-radius:20px; cursor:pointer;">离开里世界</button>
    </div>
</div>

<script>
    let path = 'oracle', god = 'Hekate', isMidnight = false;

    // 检查是否进入深夜模式 (0:00 - 5:00)
    function checkTime() {
        const hour = new Date().getHours();
        if (hour >= 0 && hour < 5) {
            isMidnight = true;
            document.getElementById('body-tag').classList.add('midnight-mode');
            document.getElementById('main-title').innerText = "ABYSS CROSSING";
            document.getElementById('sub-title').innerText = "禁忌法典：这里没有生者的出口";
            
            // 异化神名
            document.getElementById('name-hekate').innerText = "BRIMO";
            document.getElementById('tag-hekate').innerText = "愤怒 / 恐惧 / 墓地";
            document.getElementById('name-cyprian').innerText = "SORCERER CYPRIAN";
            document.getElementById('tag-cyprian').innerText = "黑巫术 / 债权 / 交易";
            document.getElementById('name-aphrodite').innerText = "PANDEMOS";
            document.getElementById('tag-aphrodite').innerText = "肉欲 / 疯狂 / 占有";
        }
    }

    const standardOracles = {
        'Hekate': ['女神为你提灯，捷径已现。','听从直觉的选择。'],
        'St. Cyprian': ['金钱契约已成。','资源正在汇聚。'],
        'Aphrodite': ['你即是魅力源泉。','联结正在萌发。']
    };

    const midnightOracles = {
        'Hekate': ['别回头，影子里的东西已经跟上你了。','钥匙碎了，今晚你哪也别想去。','她在坟场看着你，你在看谁？'],
        'St. Cyprian': ['这笔债，你打算用什么来偿还？','你的灵魂在契约书上微微发烫。','交易达成，但你丢失了一段记忆。'],
        'Aphrodite': ['你以为那是爱？那是啃食你的寄生。','她苍白的指甲正划过你的后颈。','沉溺吧，直到你忘记自己的名字。']
    };

    function setPath(p, el) {
        path = p;
        document.querySelectorAll('.path-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    function selectGod(g) {
        god = g;
        document.querySelectorAll('.god-card').forEach(c => c.classList.remove('active'));
        const id = g === 'St. Cyprian' ? 'card-cyprian' : 'card-' + g.toLowerCase();
        document.getElementById(id).classList.add('active');
    }

    function upd(el) {} // 简化版

    function execute() {
        const table = document.getElementById('table-num').value;
        if(!table) return alert('输入桌号以固定因果');
        
        const list = isMidnight ? midnightOracles[god] : standardOracles[god];
        const result = list[Math.floor(Math.random()*list.length)];
        
        generatePoster(table, result);
    }

    function generatePoster(table, result) {
        const canvas = document.getElementById('canvas-poster');
        const ctx = canvas.getContext('2d');
        const themeColor = isMidnight ? '#ff4444' : '#e6b17a';
        const bgColor = isMidnight ? '#1a0505' : '#0a0a0a';

        ctx.fillStyle = bgColor;
        ctx.fillRect(0, 0, 600, 900);
        ctx.strokeStyle = themeColor;
        ctx.lineWidth = 4;
        ctx.strokeRect(30, 30, 540, 840);

        ctx.fillStyle = themeColor;
        ctx.textAlign = 'center';
        ctx.font = '30px serif';
        ctx.fillText(isMidnight ? 'ABYSS CROSSING' : 'CROSSING BAR', 300, 120);
        
        ctx.font = 'bold 55px serif';
        const displayGod = isMidnight ? (god==='Hekate'?'BRIMO':god==='St. Cyprian'?'SORCERER':'PANDEMOS') : god.toUpperCase();
        ctx.fillText(displayGod, 300, 320);

        ctx.font = '24px sans-serif';
        ctx.fillStyle = '#888';
        ctx.fillText(`TABLE ${table} / 契约已封存`, 300, 400);

        ctx.fillStyle = '#fff';
        ctx.font = 'bold 32px sans-serif';
        // 简单换行
        if(result.length > 12) {
            ctx.fillText(result.substring(0,12), 300, 520);
            ctx.fillText(result.substring(12), 300, 570);
        } else {
            ctx.fillText(result, 300, 540);
        }

        ctx.font = 'italic 16px serif';
        ctx.fillStyle = isMidnight ? '#600' : '#3a3a3a';
        ctx.fillText(isMidnight ? 'Vae Victis. (哀悯失败者)' : 'Intent is the only active ingredient.', 300, 800);

        document.getElementById('poster-img').src = canvas.toDataURL('image/png');
        document.getElementById('poster-overlay').style.display = 'flex';
    }

    window.onload = checkTime;
</script>
</body>
</html>
