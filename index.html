<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crossing | 数字化特调</title>
    <style>
        body { 
            background-color: #0a0a0a; 
            color: #ffffff; 
            font-family: -apple-system, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0;
            padding: 40px 0;
            min-height: 100vh;
        }
        
        .container { width: 85%; max-width: 400px; text-align: center; }
        h1 { color: #e6b17a; font-size: 28px; font-weight: 300; letter-spacing: 4px; margin-bottom: 5px; }
        .subtitle { color: #555; font-size: 11px; margin-bottom: 35px; letter-spacing: 1px; }

        /* 滑块组样式 */
        .slider-group { margin-bottom: 30px; text-align: left; background: #111; padding: 15px; border-radius: 15px; border: 1px solid #1a1a1a; }
        label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; color: #aaa; font-size: 13px; }
        .icon-label { font-size: 18px; margin-right: 8px; }
        
        input[type=range] { width: 100%; height: 4px; background: #333; border-radius: 5px; appearance: none; outline: none; }
        input[type=range]::-webkit-slider-thumb { appearance: none; width: 22px; height: 22px; background: #e6b17a; border-radius: 50%; cursor: pointer; box-shadow: 0 0 8px rgba(230, 177, 122, 0.4); }

        .value-display { margin-top: 10px; color: #e6b17a; font-size: 16px; text-align: right; font-weight: 500; }

        /* 下单区 */
        .order-section { margin-top: 30px; }
        #table-num { padding: 15px; border-radius: 12px; border: 1px solid #222; background: #111; color: #fff; width: 100%; margin-bottom: 20px; box-sizing: border-box; font-size: 16px; text-align: center; outline: none; }
        #table-num:focus { border-color: #e6b17a; }

        #submit-btn { background: linear-gradient(135deg, #e6b17a, #b08e66); color: #000; border: none; padding: 18px; border-radius: 35px; width: 100%; font-weight: bold; font-size: 18px; cursor: pointer; box-shadow: 0 4px 20px rgba(230, 177, 122, 0.2); }
        #submit-btn:active { transform: scale(0.96); opacity: 0.8; }
    </style>
</head>
<body>

<div class="container">
    <h1>CROSSING</h1>
    <div class="subtitle">STRATEGIC COCKTAIL CRAFTING</div>

    <div class="slider-group">
        <label><span>🍋 酸度 ACIDITY</span></label>
        <input type="range" id="acid-slider" min="0" max="100" value="50">
        <div class="value-display"><span id="acid-value">50</span>%</div>
    </div>

    <div class="slider-group">
        <label><span>🍯 甜度 SWEETNESS</span></label>
        <input type="range" id="sweet-slider" min="0" max="100" value="50">
        <div class="value-display"><span id="sweet-value">50</span>%</div>
    </div>

    <div class="slider-group">
        <label><span>🌿 苦感 BITTERNESS</span></label>
        <input type="range" id="bitter-slider" min="0" max="100" value="0">
        <div class="value-display"><span id="bitter-value">0</span>%</div>
    </div>

    <div class="slider-group">
        <label><span>🥃 酒精度 STRENGTH</span></label>
        <input type="range" id="strength-slider" min="0" max="100" value="50">
        <div class="value-display"><span id="strength-value">50</span>%</div>
    </div>

    <div class="order-section">
        <input type="text" id="table-num" placeholder="输入桌号 (如: A01)" autocomplete="off">
        <button onclick="sendOrder()" id="submit-btn">发送需求给调酒师</button>
    </div>
</div>

<script>
    // 数值动态显示逻辑
    const sliders = ['acid', 'sweet', 'bitter', 'strength'];
    sliders.forEach(id => {
        const s = document.getElementById(id + '-slider');
        const v = document.getElementById(id + '-value');
        s.oninput = function() { v.innerText = this.value; }
    });

    function sendOrder() {
        const table = document.getElementById('table-num').value.trim();
        const acid = document.getElementById('acid-value').innerText;
        const sweet = document.getElementById('sweet-value').innerText;
        const bitter = document.getElementById('bitter-value').innerText;
        const strength = document.getElementById('strength-value').innerText;
        const btn = document.getElementById('submit-btn');

        if(!table) { alert('请填写桌号'); return; }

        btn.innerText = "正在传送魔法...";
        btn.disabled = true;

        const pushKey = "PDU40747TdeTeirMy2wQe12azBvWvUBOk9S5WjMtt"; 
        const title = encodeURIComponent(`Crossing新订单：${table}桌`);
        const content = encodeURIComponent(`🍋酸:${acid} | 🍯甜:${sweet} | 🌿苦:${bitter} | 🥃烈:${strength}`);

        // 使用 Image 对象发送（最稳方案）
        const sender = new Image();
        sender.onload = sender.onerror = function() {
            alert('口味需求已送达！');
            btn.innerText = "发送需求给调酒师";
            btn.disabled = false;
        };
        sender.src = `https://api2.pushdeer.com/message/push?pushkey=${pushKey}&text=${title}&desp=${content}&t=${new Date().getTime()}`;
    }
</script>

</body>
</html>
