<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crossing | 战略法典</title>
    <style>
        :root { --gold: #e6b17a; --bg: #0a0a0a; --card: #1a1a1a; --text: #ddd; --bad: #7c0000; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, "Noto Sans SC", serif; margin: 0; padding: 0; overflow-x: hidden; }
        .container { width: 92%; max-width: 500px; margin: 0 auto; padding: 40px 0 120px 0; transition: 0.5s; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 2.8rem; letter-spacing: 10px; color: var(--gold); margin: 0; font-weight: 300; }
        .intro-text { font-size: 13px; color: #666; margin-top: 12px; letter-spacing: 2px; }
        .step-box { background: var(--card); border: 1px solid #2a2a2a; border-radius: 24px; padding: 25px 20px; margin-bottom: 20px; box-sizing: border-box; }
        .step-num { color: var(--gold); font-size: 10px; font-weight: bold; margin-bottom: 10px; display: block; opacity: 0.6; }
        .step-title { font-size: 16px; margin-bottom: 18px; color: #fff; text-align: left; }
        
        /* 力量选择 */
        .god-scroll { display: flex; overflow-x: auto; gap: 12px; padding-bottom: 10px; scrollbar-width: none; }
        .god-scroll::-webkit-scrollbar { display: none; }
        .god-card { min-width: 125px; padding: 15px 10px; background: #111; border: 1px solid #333; border-radius: 18px; text-align: center; transition: 0.4s; flex-shrink: 0; }
        .god-card.active { border-color: var(--gold); background: rgba(230,177,122,0.08); transform: translateY(-3px); }
        .god-img-wrap { width: 60px; height: 60px; border-radius: 50%; border: 1px solid #333; margin: 0 auto 12px auto; overflow: hidden; }
        .god-img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); transition: 0.4s; }
        .god-card.active .god-img { filter: grayscale(0%); border-color: var(--gold); }
        .god-name { font-size: 14px; font-weight: bold; color: var(--gold); margin-bottom: 5px; }
        .god-tag { font-size: 10px; color: #555; }

        /* 风味滑块 */
        .flavor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .slider-item { margin-bottom: 15px; }
        .slider-label { display: flex; justify-content: space-between; font-size: 11px; color: #888; margin-bottom: 8px; }
        .slider-val { color: var(--gold); }
        input[type=range] { width: 100%; height: 2px; background: #333; appearance: none; outline: none; }
        input[type=range]::-webkit-slider-thumb { appearance: none; width: 18px; height: 18px; background: var(--gold); border-radius: 50%; border: 3px solid #000; }

        .path-group { display: flex; gap: 10px; }
        .path-btn { flex: 1; padding: 15px 5px; border: 1px solid #333; border-radius: 12px; background: #111; color: #666; font-size: 13px; }
        .path-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(230,177,122,0.1); }
        
        .footer-action { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(10,10,10,0.95); backdrop-filter: blur(15px); padding: 20px 0; border-top: 1px solid #222; text-align: center; z-index: 100; }
        #table-num { background: #1a1a1a; border: 1px solid #333; border-radius: 10px; color: var(--gold); text-align: center; font-size: 16px; padding: 10px; width: 80px; margin-right: 10px; outline: none; }
        #submit-btn { padding: 12px 30px; border-radius: 10px; border: none; background: var(--gold); color: #000; font-size: 16px; font-weight: bold; }

        .task-modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 85%; max-width: 380px; background: #1a1a1a; border: 2px solid var(--gold); border-radius: 25px;
            padding: 35px 20px; z-index: 3000; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.9);
        }
        .task-content { color: #fff; font-size: 15px; margin: 20px 0; line-height: 1.6; border-top: 1px solid #333; border-bottom: 1px solid #333; padding: 15px 0; }
        .modal-btns { display: flex; gap: 10px; }
        .modal-btns button { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: bold; }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
        #poster-img { width: 85%; max-width: 350px; border-radius: 12px; }
    </style>
</head>
<body>

<div class="container" id="main-ui">
    <header>
        <h1>CROSSING</h1>
        <div class="intro-text">意志即配方 · 调配你的战略契约</div>
    </header>

    <div class="step-box">
        <span class="step-num">STEP 01. PATH</span>
        <div class="step-title">设定意图：</div>
        <div class="path-group">
            <button class="path-btn active" onclick="setPath('oracle', this)">✧ 寻求神谕</button>
            <button class="path-btn" onclick="setPath('ritual', this)">❂ 开启仪式</button>
        </div>
    </div>

    <div class="step-box">
        <span class="step-num">STEP 02. LINKAGE</span>
        <div class="step-title">原型力量：</div>
        <div class="god-scroll">
            <div class="god-card active" id="card-hekate" onclick="selectGod('Hekate')">
                <div class="god-img-wrap"><img src="hekate.jpg" class="god-img"></div>
                <div class="god-name">HEKATE</div>
                <div class="god-tag">路径 / 提灯</div>
            </div>
            <div class="god-card" id="card-cyprian" onclick="selectGod('St. Cyprian')">
                <div class="god-img-wrap"><img src="cyprian.jpg" class="god-img"></div>
                <div class="god-name">CYPRIAN</div>
                <div class="god-tag">物质 / 契约</div>
            </div>
            <div class="god-card" id="card-aphrodite" onclick="selectGod('Aphrodite')">
                <div class="god-img-wrap"><img src="aphrodite.jpg" class="god-img"></div>
                <div class="god-name">APHRODITE</div>
                <div class="god-tag">联结 / 魅力</div>
            </div>
        </div>
    </div>

    <div class="step-box">
        <span class="step-num">STEP 03. ELEMENTS</span>
        <div class="step-title">风味炼金：</div>
        <div class="flavor-grid">
            <div class="slider-item">
                <div class="slider-label"><span>🍋 酸度</span> <span class="slider-val" id="acid-v">50%</span></div>
                <input type="range" id="acid" min="0" max="100" value="50" oninput="upd(this)">
            </div>
            <div class="slider-item">
                <div class="slider-label"><span>🍬 甜度</span> <span class="slider-val" id="sweet-v">50%</span></div>
                <input type="range" id="sweet" min="0" max="100" value="50" oninput="upd(this)">
            </div>
            <div class="slider-item">
                <div class="slider-label"><span>🌿 苦味</span> <span class="slider-val" id="bitter-v">0%</span></div>
                <input type="range" id="bitter" min="0" max="100" value="0" oninput="upd(this)">
            </div>
            <div class="slider-item">
                <div class="slider-label"><span>🥃 酒感</span> <span class="slider-val" id="abv-v">50%</span></div>
                <input type="range" id="abv" min="0" max="100" value="50" oninput="upd(this)">
            </div>
        </div>
    </div>
</div>

<div class="footer-action">
    <input type="text" id="table-num" placeholder="桌号">
    <button id="submit-btn" onclick="startRitual()">开启仪式</button>
</div>

<div id="task-modal" class="task-modal">
    <h2 style="color:var(--gold); margin:0; font-size:20px;">✦ 契约挑战 ✦</h2>
    <div class="task-content" id="task-text"></div>
    <span id="task-prize" style="color:var(--gold); font-weight:bold; font-size:14px; display:block; margin-bottom:20px;"></span>
    <div class="modal-btns">
        <button style="background:#333; color:#888;" onclick="finalize(false)">仅看神谕</button>
        <button style="background:var(--gold); color:#000;" onclick="finalize(true)">接受挑战</button>
    </div>
</div>

<div id="poster-overlay" class="overlay">
    <canvas id="canvas-poster" width="600" height="900" style="display:none;"></canvas>
    <img id="poster-img" src="">
    <button onclick="location.reload()" style="margin-top:20px; background:transparent; border:1px solid #444; color:#888; padding:10px 25px; border-radius:20px;">返回法典</button>
</div>

<script>
    let path = 'oracle', god = 'Hekate', currentTask = null;

    const goodOracles = {
        'Hekate': ['【大吉】女神提灯，捷径已现。', '【吉】阴影消散，守中即可。', '【中吉】十字路口，直觉为先。'],
        'St. Cyprian': ['【大吉】契约已成，物质门开。', '【吉】资源汇聚，长辈提携。', '【中吉】理智平衡，产出对等。'],
        'Aphrodite': ['【大吉】磁场峰值，吸引中心。', '【吉】联结萌发，协作有报。', '【中吉】爱如潮汐，顺应流动。']
    };

    const badOracles = {
        'Hekate': ['【大凶】钥匙生锈，此路暂封。', '【凶】灯火摇晃，莫入暗巷。'],
        'St. Cyprian': ['【大凶】契约反噬，暂避交易。', '【凶】财气外泄，捂紧钱包。'],
        'Aphrodite': ['【大凶】烂桃花现，沉溺即苦。', '【凶】磁场混乱，言多必失。']
    };

    const taskLibrary = [
        { title: "沉默供奉", text: "放下手机观察冰块消融15分钟。完成后出示海报。", prize: "静默之水" },
        { title: "真名公证", text: "在杯垫写下渴望的力量并去洗手间念真名。", prize: "契约之饮" },
        { title: "物质投射", text: "发布海报配文‘意志即配方’，3分钟内不看手机。", prize: "概率之饮" }
    ];

    function setPath(p, el) {
        path = p;
        document.querySelectorAll('.path-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    function selectGod(g) {
        god = g;
        document.querySelectorAll('.god-card').forEach(c => c.classList.remove('active'));
        const id = g === 'St. Cyprian' ? 'card-cyprian' : 'card-' + g.toLowerCase();
        document.getElementById(id).classList.add('active');
    }

    function upd(el) { document.getElementById(el.id + '-v').innerText = el.value + '%'; }

    function startRitual() {
        const table = document.getElementById('table-num').value;
        if(!table) return alert('输入桌号以固定因果');
        currentTask = taskLibrary[Math.floor(Math.random() * taskLibrary.length)];
        document.getElementById('task-text').innerText = `【${currentTask.title}】\n${currentTask.text}`;
        document.getElementById('task-prize').innerText = `奖励：[${currentTask.prize}]`;
        document.getElementById('task-modal').style.display = 'block';
        document.getElementById('main-ui').style.opacity = '0.3';
    }

    function finalize(acceptTask) {
        const table = document.getElementById('table-num').value;
        document.getElementById('task-modal').style.display = 'none';
        let oracle = (Math.random() < 0.10) 
            ? badOracles[god][Math.floor(Math.random() * badOracles[god].length)]
            : goodOracles[god][Math.floor(Math.random() * goodOracles[god].length)];
        
        generatePoster(table, oracle, oracle.includes('凶'), acceptTask);
        sendOrder(table, oracle, acceptTask);
    }

    function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
        let words = text.split('');
        let line = '';
        for(let n = 0; n < words.length; n++) {
            let testLine = line + words[n];
            if (ctx.measureText(testLine).width > maxWidth && n > 0) {
                ctx.fillText(line, x, y);
                line = words[n];
                y += lineHeight;
            } else { line = testLine; }
        }
        ctx.fillText(line, x, y);
    }

    function generatePoster(table, oracle, isBad, hasTask) {
        const canvas = document.getElementById('canvas-poster');
        const ctx = canvas.getContext('2d');
        const themeColor = isBad ? '#7c0000' : '#e6b17a';

        ctx.fillStyle = '#0a0a0a';
        ctx.fillRect(0, 0, 600, 900);
        ctx.strokeStyle = themeColor;
        ctx.lineWidth = hasTask ? 6 : 2;
        ctx.strokeRect(30, 30, 540, 840);

        ctx.fillStyle = themeColor;
        ctx.textAlign = 'center';
        ctx.font = '30px serif';
        ctx.fillText(isBad ? 'WARNING / 警戒' : 'FATED ORACLE', 300, 100);

        ctx.font = 'bold 50px serif';
        ctx.fillText(god.toUpperCase(), 300, 260);

        // 绘制四维风味
        ctx.font = '16px sans-serif';
        ctx.fillStyle = '#555';
        const f = `A:${document.getElementById('acid').value}% S:${document.getElementById('sweet').value}% B:${document.getElementById('bitter').value}% V:${document.getElementById('abv').value}%`;
        ctx.fillText(f, 300, 315);

        ctx.fillStyle = isBad ? '#7c0000' : '#fff';
        ctx.font = 'bold 32px sans-serif';
        wrapText(ctx, oracle, 300, 440, 440, 55);

        if(hasTask && currentTask) {
            ctx.strokeStyle = '#333';
            ctx.beginPath(); ctx.moveTo(150, 600); ctx.lineTo(450, 600); ctx.stroke();
            ctx.fillStyle = '#e6b17a';
            ctx.font = 'bold 22px sans-serif';
            ctx.fillText(currentTask.title, 300, 650);
            ctx.fillStyle = '#888';
            ctx.font = '18px sans-serif';
            wrapText(ctx, currentTask.text, 300, 690, 400, 30);
        }

        ctx.font = 'italic 16px serif';
        ctx.fillStyle = '#333';
        ctx.fillText(`TABLE ${table} · CROSSING BAR`, 300, 830);
        document.getElementById('poster-img').src = canvas.toDataURL('image/png');
        document.getElementById('poster-overlay').style.display = 'flex';
    }

    function sendOrder(table, res, hasTask) {
        const f = `酸${document.getElementById('acid').value} 甜${document.getElementById('sweet').value} 苦${document.getElementById('bitter').value} 酒${document.getElementById('abv').value}`;
        const desc = encodeURIComponent(`桌:${table}\n风味:${f}\n神:${god}\n结果:${res}\n任务:${hasTask ? currentTask.title : '无'}`);
        new Image().src = `https://api2.pushdeer.com/message/push?pushkey=PDU40747TdeTeirMy2wQe12azBvWvUBOk9S5WjMtt&text=Crossing_${table}&desp=${desc}`;
    }
</script>
</body>
</html>
