<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crossing | 战略法典</title>
    <style>
        :root { --gold: #e6b17a; --bg: #0a0a0a; --card: #151515; }
        
        body { 
            background: var(--bg); color: #fff; font-family: 'serif'; 
            margin: 0; padding: 0; display: flex; justify-content: center;
        }

        .container { width: 90%; max-width: 450px; padding: 40px 0; }

        /* 引导式标题 */
        header { text-align: center; margin-bottom: 40px; }
        h1 { font-size: 2.5rem; letter-spacing: 8px; color: var(--gold); margin: 0; font-weight: 300; }
        .intro-text { font-size: 12px; color: #666; margin-top: 10px; letter-spacing: 2px; line-height: 2; }

        /* 步骤容器 */
        .step-box { 
            background: var(--card); border: 1px solid #222; border-radius: 24px;
            padding: 25px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .step-num { color: var(--gold); font-size: 10px; font-weight: bold; margin-bottom: 15px; display: block; opacity: 0.7; }
        .step-title { font-size: 18px; margin-bottom: 20px; color: #ddd; text-align: left; }

        /* 路径选择按钮 */
        .path-group { display: flex; gap: 10px; }
        .path-btn { 
            flex: 1; padding: 15px; border: 1px solid #333; border-radius: 12px; 
            background: #111; color: #888; font-size: 13px; cursor: pointer; transition: 0.3s;
        }
        .path-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(230,177,122,0.05); }

        /* 神灵选择卡片 */
        .god-scroll { display: flex; overflow-x: auto; gap: 15px; padding-bottom: 10px; scrollbar-width: none; }
        .god-scroll::-webkit-scrollbar { display: none; }
        .god-card { 
            min-width: 140px; padding: 20px; background: #111; border: 1px solid #333; border-radius: 16px; 
            text-align: center; transition: 0.4s; position: relative;
        }
        .god-card.active { border-color: var(--gold); background: rgba(230,177,122,0.05); transform: scale(1.05); }
        .god-name { font-size: 15px; font-weight: bold; margin-bottom: 5px; color: var(--gold); }
        .god-tag { font-size: 10px; color: #555; }
        .lore-btn { font-size: 10px; color: var(--gold); margin-top: 10px; text-decoration: underline; cursor: pointer; }

        /* 滑块 */
        .slider-item { margin-bottom: 20px; }
        .slider-label { display: flex; justify-content: space-between; font-size: 11px; color: #777; margin-bottom: 8px; }
        input[type=range] { width: 100%; height: 2px; background: #333; appearance: none; outline: none; }
        input[type=range]::-webkit-slider-thumb { appearance: none; width: 14px; height: 14px; background: var(--gold); border-radius: 50%; }

        /* 下单区 */
        .footer-action { text-align: center; }
        #table-num { 
            background: transparent; border: none; border-bottom: 1px solid #333; 
            color: #fff; text-align: center; font-size: 18px; padding: 10px; width: 150px; margin-bottom: 25px; outline: none;
        }
        #submit-btn { 
            width: 100%; padding: 20px; border-radius: 50px; border: none;
            background: linear-gradient(135deg, #e6b17a, #b08e66); color: #000;
            font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* 弹窗样式 */
        .overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; align-items: center; justify-content: center;
        }
        .modal { width: 80%; background: #111; border: 1px solid var(--gold); padding: 30px; border-radius: 24px; text-align: center; }
        .modal-h { color: var(--gold); font-size: 20px; margin-bottom: 15px; }
        .modal-p { color: #ccc; font-size: 14px; line-height: 1.8; margin-bottom: 25px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>CROSSING</h1>
        <div class="intro-text">
            欢迎来到交界地。<br>
            请在这里通过神祇的契约，调配你的意图。
        </div>
    </header>

    <div class="step-box">
        <span class="step-num">STEP 01. INTENT / 意图</span>
        <div class="step-title">你今日为何而来？</div>
        <div class="path-group">
            <button class="path-btn active" onclick="setPath('oracle', this)">✧ 寻求启示 (占卜)</button>
            <button class="path-btn" onclick="setPath('ritual', this)">❂ 开启干预 (仪式)</button>
        </div>
    </div>

    <div class="step-box">
        <span class="step-num">STEP 02. ARCHETYPE / 链接</span>
        <div class="step-title">你想通过哪位神灵降临？</div>
        <div class="god-scroll">
            <div class="god-card active" id="card-hekate" onclick="selectGod('Hekate', 80, 20, 60, 70)">
                <div class="god-name">HEKATE</div>
                <div class="god-tag">守护 · 指引 · 迷茫</div>
                <div class="lore-btn" onclick="showLore('Hekate'); event.stopPropagation();">灵知详情</div>
            </div>
            <div class="god-card" id="card-cyprian" onclick="selectGod('St. Cyprian', 40, 40, 70, 80)">
                <div class="god-name">ST. CYPRIAN</div>
                <div class="god-tag">财富 · 契约 · 事业</div>
                <div class="lore-btn" onclick="showLore('St. Cyprian'); event.stopPropagation();">灵知详情</div>
            </div>
            <div class="god-card" id="card-aphrodite" onclick="selectGod('Aphrodite', 30, 85, 10, 40)">
                <div class="god-name">APHRODITE</div>
                <div class="god-tag">魅力 · 爱情 · 欢愉</div>
                <div class="lore-btn" onclick="showLore('Aphrodite'); event.stopPropagation();">灵知详情</div>
            </div>
        </div>
    </div>

    <div class="step-box">
        <span class="step-num">STEP 03. ELEMENTS / 元素</span>
        <div class="step-title">基于神性的风味调配：</div>
        
        <div class="slider-item">
            <div class="slider-label"><span>🍋 酸度</span> <span id="acid-v">80%</span></div>
            <input type="range" id="acid" min="0" max="100" value="80" oninput="upd(this)">
        </div>
        <div class="slider-item">
            <div class="slider-label"><span>🍯 甜度</span> <span id="sweet-v">20%</span></div>
            <input type="range" id="sweet" min="0" max="100" value="20" oninput="upd(this)">
        </div>
        <div class="slider-item">
            <div class="slider-label"><span>🌿 苦感</span> <span id="bitter-v">60%</span></div>
            <input type="range" id="bitter" min="0" max="100" value="60" oninput="upd(this)">
        </div>
        <div class="slider-item">
            <div class="slider-label"><span>🥃 酒感</span> <span id="strength-v">70%</span></div>
            <input type="range" id="strength" min="0" max="100" value="70" oninput="upd(this)">
        </div>
    </div>

    <div class="footer-action">
        <input type="text" id="table-num" placeholder="请输入桌号">
        <button id="submit-btn" onclick="execute()">开启仪式</button>
    </div>
</div>

<div id="modal-overlay" class="overlay">
    <div class="modal">
        <div id="m-title" class="modal-h"></div>
        <div id="m-body" class="modal-p"></div>
        <button onclick="closeModal()" style="background:var(--gold); border:none; padding:12px 30px; border-radius:30px; font-weight:bold;">接收指引</button>
    </div>
</div>

<script>
    let path = 'oracle', god = 'Hekate', lastResult = '';
    const lores = {
        'Hekate': '赫卡忒是三岔路口的掌灯者。当你处于人生转折点或需要避邪、驱散负面能量时，她是你的引路人。',
        'St. Cyprian': '圣塞浦路斯是魔法师的主保圣人，掌握着物质界的契约与财富流向。适合事业跃迁者。',
        'Aphrodite': '美神阿弗洛狄特不仅仅关于爱情，更关于个人魅力的磁场增强与社交中的吸引力。'
    };
    const oracles = {
        'Hekate': ['大吉: 女神为你提灯。','吉: 阴影消散中。','凶: 宜守不宜攻。'],
        'St. Cyprian': ['大吉: 契约已成。','吉: 资源正在靠近。','凶: 警惕账目。'],
        'Aphrodite': ['大吉: 你即是魅力本身。','吉: 联结正在萌发。','凶: 莫要沉溺。']
    };
    const rituals = {
        'Hekate': '饮用前轻磕杯底三下，想象生活阻碍碎裂。',
        'St. Cyprian': '将硬币压在杯垫下饮用，右手握杯。',
        'Aphrodite': '沾一点杯口水气点在眉心，深呼吸三次。'
    };

    function setPath(p, el) {
        path = p;
        document.querySelectorAll('.path-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    function selectGod(g, a, s, b, l) {
        god = g;
        document.querySelectorAll('.god-card').forEach(c => c.classList.remove('active'));
        document.getElementById('card-'+g.toLowerCase().replace('st. ', '')).classList.add('active');
        document.getElementById('acid').value = a; document.getElementById('acid-v').innerText = a+'%';
        document.getElementById('sweet').value = s; document.getElementById('sweet-v').innerText = s+'%';
        document.getElementById('bitter').value = b; document.getElementById('bitter-v').innerText = b+'%';
        document.getElementById('strength').value = l; document.getElementById('strength-v').innerText = l+'%';
    }

    function upd(el) { document.getElementById(el.id+'-v').innerText = el.value+'%'; }

    function showLore(g) { 
        openModal('灵知：'+g, lores[g]); 
    }

    function openModal(t, b) {
        document.getElementById('m-title').innerText = t;
        document.getElementById('m-body').innerText = b;
        document.getElementById('modal-overlay').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
        if(window.isFinal) sendOrder();
    }

    function execute() {
        const table = document.getElementById('table-num').value;
        if(!table) return alert('请输入桌号');
        
        let res = '';
        if(path === 'oracle') {
            const list = oracles[god];
            res = list[Math.floor(Math.random()*list.length)];
            openModal('占卜结果', res);
        } else {
            res = rituals[god];
            openModal('仪式指令', res);
        }
        lastResult = res;
        window.isFinal = true;
    }

    function sendOrder() {
        const table = document.getElementById('table-num').value;
        const pushKey = "PDU40747TdeTeirMy2wQe12azBvWvUBOk9S5WjMtt";
        const desc = encodeURIComponent(`桌:${table}\n路:${path}\n神:${god}\n果:${lastResult}`);
        new Image().src = `https://api2.pushdeer.com/message/push?pushkey=${pushKey}&text=Crossing订单&desp=${desc}`;
        alert('仪式启动。');
        window.isFinal = false;
    }
</script>
</body>
</html>
