<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crossing | 灵感法典</title>
    <style>
        /* 保持之前的暗黑星空风格 */
        body { 
            background: radial-gradient(circle at center, #1b1b1b 0%, #000 100%);
            color: #ffffff; font-family: 'PingFang SC', serif; 
            margin: 0; padding: 20px 0; display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 90%; max-width: 450px; text-align: center; }
        h1 { color: #e6b17a; letter-spacing: 6px; text-shadow: 0 0 15px rgba(230,177,122,0.5); margin-bottom: 5px; }

        /* 酒款滚动展示区 */
        .menu-scroll {
            display: flex; overflow-x: auto; gap: 15px; padding: 20px 0;
            scrollbar-width: none; /* Firefox */
        }
        .menu-scroll::-webkit-scrollbar { display: none; }

        .drink-card {
            min-width: 160px; background: rgba(30,30,30,0.8);
            border: 1px solid rgba(230,177,122,0.2); border-radius: 15px;
            padding: 15px; cursor: pointer; transition: 0.3s;
        }
        .drink-card.active { border-color: #e6b17a; box-shadow: 0 0 15px rgba(230,177,122,0.3); }
        .drink-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 10px; border: 2px solid #e6b17a; }
        .drink-name { color: #e6b17a; font-size: 14px; font-weight: bold; }
        .drink-desc { font-size: 10px; color: #888; margin-top: 5px; line-height: 1.4; }

        /* 滑块部分保持高级感 */
        .slider-group { 
            margin-bottom: 20px; text-align: left; background: rgba(20, 20, 20, 0.8); 
            padding: 15px; border-radius: 15px; border: 1px solid rgba(230, 177, 122, 0.1);
        }
        label { display: block; margin-bottom: 10px; color: #888; font-size: 11px; }
        input[type=range] { width: 100%; height: 2px; background: #333; appearance: none; outline: none; }
        input[type=range]::-webkit-slider-thumb { appearance: none; width: 18px; height: 18px; background: #e6b17a; border-radius: 50%; }
        .value-display { margin-top: 8px; color: #e6b17a; font-size: 14px; text-align: right; }

        #table-num { 
            padding: 15px; border-radius: 12px; border: 1px solid #333; background: transparent; 
            color: #fff; width: 100%; margin-bottom: 20px; box-sizing: border-box; text-align: center;
        }
        #submit-btn { 
            background: transparent; border: 1px solid #e6b17a; color: #e6b17a; 
            padding: 18px; border-radius: 40px; width: 100%; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>CROSSING</h1>
    <div style="color:#555; font-size:10px; letter-spacing:2px;">SELECT YOUR POTION</div>

    <div class="menu-scroll" id="menu">
        <div class="drink-card active" onclick="selectDrink(this, '自定义特调', 50, 50, 0, 50)">
            <img src="https://via.placeholder.com/100/222/e6b17a?text=Magic" class="drink-img">
            <div class="drink-name">自定义特调</div>
            <div class="drink-desc">由你定义元素的流向，开启未知的仪式。</div>
        </div>
        
        <div class="drink-card" onclick="selectDrink(this, '赫卡忒', 80, 30, 60, 70)">
            <img src="https://via.placeholder.com/100/222/e6b17a?text=Hekate" class="drink-img">
            <div class="drink-name">赫卡忒</div>
            <div class="drink-desc">三岔路口的迷雾，高酸与草本苦感的交织。</div>
        </div>

        <div class="drink-card" onclick="selectDrink(this, '赫尔墨斯', 40, 70, 10, 40)">
            <img src="https://via.placeholder.com/100/222/e6b17a?text=Hermes" class="drink-img">
            <div class="drink-name">赫尔墨斯</div>
            <div class="drink-desc">轻盈的飞羽，带有蜂蜜的清甜与柑橘调。</div>
        </div>
    </div>

    <div style="margin: 20px 0; color: #e6b17a; font-style: italic; font-size: 13px;" id="selected-title">当前选择：自定义特调</div>

    <div class="slider-group">
        <label>🍋 酸度 ACIDITY</label>
        <input type="range" id="acid-slider" min="0" max="100" value="50">
        <div class="value-display"><span id="acid-value">50</span>%</div>
    </div>
    <div class="slider-group">
        <label>🍯 甜度 SWEETNESS</label>
        <input type="range" id="sweet-slider" min="0" max="100" value="50">
        <div class="value-display"><span id="sweet-value">50</span>%</div>
    </div>
    <div class="slider-group">
        <label>🌿 苦感 BITTERNESS</label>
        <input type="range" id="bitter-slider" min="0" max="100" value="0">
        <div class="value-display"><span id="bitter-value">0</span>%</div>
    </div>
    <div class="slider-group">
        <label>🥃 酒精度 STRENGTH</label>
        <input type="range" id="strength-slider" min="0" max="100" value="50">
        <div class="value-display"><span id="strength-value">50</span>%</div>
    </div>

    <input type="text" id="table-num" placeholder="于何处降临 (桌号)">
    <button onclick="sendOrder()" id="submit-btn">注入以太完成点单</button>
</div>

<script>
    let currentDrink = "自定义特调";

    // 选择酒款函数
    function selectDrink(element, name, a, s, b, l) {
        // 更新 UI 样式
        document.querySelectorAll('.drink-card').forEach(c => c.classList.remove('active'));
        element.classList.add('active');
        
        // 更新文字和滑块
        currentDrink = name;
        document.getElementById('selected-title').innerText = "当前选择：" + name;
        
        updateSlider('acid', a);
        updateSlider('sweet', s);
        updateSlider('bitter', b);
        updateSlider('strength', l);
    }

    function updateSlider(id, val) {
        const s = document.getElementById(id + '-slider');
        const v = document.getElementById(id + '-value');
        s.value = val;
        v.innerText = val;
    }

    // 滑块手动调节
    ['acid', 'sweet', 'bitter', 'strength'].forEach(id => {
        const s = document.getElementById(id + '-slider');
        const v = document.getElementById(id + '-value');
        s.oninput = function() { v.innerText = this.value; }
    });

    function sendOrder() {
        const table = document.getElementById('table-num').value.trim();
        if(!table) { alert('请输入桌号'); return; }

        const a = document.getElementById('acid-value').innerText;
        const s = document.getElementById('sweet-value').innerText;
        const b = document.getElementById('bitter-value').innerText;
        const l = document.getElementById('strength-value').innerText;

        const pushKey = "PDU40747TdeTeirMy2wQe12azBvWvUBOk9S5WjMtt";
        const title = encodeURIComponent(`Crossing订单：${table}号 [${currentDrink}]`);
        const desc = encodeURIComponent(`酸:${a} 甜:${s} 苦:${b} 烈:${l}`);

        const img = new Image();
        img.onload = img.onerror = function() { alert('仪式完成，请静候。'); };
        img.src = `https://api2.pushdeer.com/message/push?pushkey=${pushKey}&text=${title}&desp=${desc}&t=${new Date().getTime()}`;
    }
</script>
</body>
</html>
