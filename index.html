<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crossing | 灵感法典与神谕</title>
    <style>
        body { 
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            color: #ffffff; font-family: 'PingFang SC', serif; 
            margin: 0; padding: 20px 0; display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 90%; max-width: 450px; text-align: center; }
        h1 { color: #e6b17a; letter-spacing: 6px; text-shadow: 0 0 15px rgba(230,177,122,0.5); margin-bottom: 10px; font-weight: 300; }
        .subtitle { color: #555; font-size: 10px; margin-bottom: 25px; letter-spacing: 2px; }

        /* 祈愿引导 */
        .wish-section {
            background: rgba(230, 177, 122, 0.05);
            border: 1px dashed rgba(230, 177, 122, 0.3);
            border-radius: 15px; padding: 15px; margin-bottom: 25px;
        }
        .wish-label { color: #e6b17a; font-size: 13px; margin-bottom: 10px; display: block; }
        #wish-select {
            background: #111; color: #fff; border: 1px solid #444; padding: 10px;
            width: 100%; border-radius: 8px; outline: none;
        }

        /* 酒款卡片滚动 */
        .menu-scroll {
            display: flex; overflow-x: auto; gap: 15px; padding: 10px 0 25px 0;
            scrollbar-width: none;
        }
        .menu-scroll::-webkit-scrollbar { display: none; }

        .drink-card {
            min-width: 200px; background: rgba(25,25,25,0.9);
            border: 1px solid rgba(230,177,122,0.1); border-radius: 20px;
            padding: 15px; cursor: pointer; transition: 0.4s;
        }
        .drink-card.active { border-color: #e6b17a; box-shadow: 0 0 20px rgba(230,177,122,0.2); transform: translateY(-5px); }
        .drink-name { color: #e6b17a; font-size: 16px; font-weight: bold; margin: 10px 0; }
        .drink-domain { font-size: 10px; background: #e6b17a; color: #000; padding: 2px 8px; border-radius: 10px; display: inline-block; margin-bottom: 10px; }
        .drink-story { font-size: 11px; color: #888; line-height: 1.5; text-align: left; }

        /* 滑块区 */
        .slider-group { 
            margin-bottom: 15px; text-align: left; background: rgba(15,15,15,0.8); 
            padding: 12px 15px; border-radius: 12px;
        }
        label { display: flex; justify-content: space-between; color: #666; font-size: 11px; margin-bottom: 8px; }
        .val-text { color: #e6b17a; font-weight: bold; }
        input[type=range] { width: 100%; height: 2px; background: #333; appearance: none; outline: none; }
        input[type=range]::-webkit-slider-thumb { appearance: none; width: 16px; height: 16px; background: #e6b17a; border-radius: 50%; box-shadow: 0 0 10px #e6b17a; }

        /* 神谕弹窗样式 */
        #oracle-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 999; flex-direction: column; align-items: center; justify-content: center;
        }
        #oracle-box {
            width: 80%; max-width: 350px; padding: 30px; background: #111; border: 1px solid #e6b17a;
            border-radius: 20px; text-align: center; box-shadow: 0 0 50px rgba(230, 177, 122, 0.3);
        }
        #oracle-title { color: #e6b17a; font-size: 14px; letter-spacing: 3px; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        #oracle-content { color: #fff; font-size: 18px; line-height: 1.8; margin-bottom: 30px; font-style: italic; }

        #table-num { padding: 15px; border-radius: 30px; border: 1px solid #333; background: transparent; color: #fff; width: 100%; margin: 15px 0; box-sizing: border-box; text-align: center; }
        #submit-btn { background: linear-gradient(135deg, #e6b17a, #b08e66); color: #000; border: none; padding: 18px; border-radius: 40px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>CROSSING</h1>
    <div class="subtitle">STRATEGIC SORCERY COCKTAILS</div>

    <div class="wish-section">
        <label class="wish-label">✧ 此时此刻，你最想增强哪种力量？</label>
        <select id="wish-select" onchange="applyWish()">
            <option value="">-- 请选择您的祈愿 --</option>
            <option value="protection">守护与指引 (Hekate)</option>
            <option value="wealth">金钱与权能 (St. Cyprian)</option>
            <option value="love">魅力与情欲 (Aphrodite)</option>
        </select>
    </div>

    <div class="menu-scroll" id="menu">
        <div class="drink-card active" id="card-hekate" onclick="selectDrink('Hekate', 80, 20, 60, 70)">
            <div class="drink-domain">守护 · 抉择</div>
            <div class="drink-name">HEKATE</div>
            <div class="drink-story">三岔路口的女神，赐予迷茫者提灯的勇气。</div>
        </div>
        <div class="drink-card" id="card-cyprian" onclick="selectDrink('St. Cyprian', 40, 40, 70, 80)">
            <div class="drink-domain">金钱 · 契约</div>
            <div class="drink-name">ST. CYPRIAN</div>
            <div class="drink-story">魔法师的主保圣人，掌握物质界流动的秘密。</div>
        </div>
        <div class="drink-card" id="card-aphrodite" onclick="selectDrink('Aphrodite', 30, 85, 10, 40)">
            <div class="drink-domain">爱情 · 魅力</div>
            <div class="drink-name">APHRODITE</div>
            <div class="drink-story">海中诞生的美神，点燃吸引力与欢愉的火种。</div>
        </div>
    </div>

    <div style="color: #e6b17a; font-size: 13px; margin-bottom: 15px;" id="selected-title">当前链接：HEKATE</div>
    
    <div class="slider-group"><label><span>🍋 酸度</span> <span class="val-text"><span id="acid-value">80</span>%</span></label><input type="range" id="acid-slider" min="0" max="100" value="80"></div>
    <div class="slider-group"><label><span>🍯 甜度</span> <span class="val-text"><span id="sweet-value">20</span>%</span></label><input type="range" id="sweet-slider" min="0" max="100" value="20"></div>
    <div class="slider-group"><label><span>🌿 苦感</span> <span class="val-text"><span id="bitter-value">60</span>%</span></label><input type="range" id="bitter-slider" min="0" max="100" value="60"></div>
    <div class="slider-group"><label><span>🥃 烈度</span> <span class="val-text"><span id="strength-value">70</span>%</span></label><input type="range" id="strength-slider" min="0" max="100" value="70"></div>

    <input type="text" id="table-num" placeholder="于何处降临 (桌号)">
    <button onclick="castOracle()" id="submit-btn">开启仪式并接收神谕</button>
</div>

<div id="oracle-overlay">
    <div id="oracle-box">
        <div id="oracle-title">神 谕 降 临</div>
        <div id="oracle-content">... 正在感应以太 ...</div>
        <button onclick="closeOracle()" style="background:#222; color:#e6b17a; border:1px solid #e6b17a; padding:10px 20px; border-radius:20px; cursor:pointer;">接收并点单</button>
    </div>
</div>

<script>
    let currentDrink = "Hekate";

    const oracles = {
        'Hekate': [
            "三岔路口，左边是坦途，右边是真理，你手中的灯火将照亮答案。",
            "阴影并非敌人，而是光芒的注脚。在黑暗中站稳，你即是主宰。",
            "钥匙已交予你手，但在开启门扉前，请先听从内心的声音。"
        ],
        'St. Cyprian': [
            "金钱是流动的血液，唯有敢于定契约者，方能主导其流向。",
            "书页中隐藏着繁荣的符文，保持慷慨，财富将以百倍归来。",
            "权能不仅是掌控，更是平衡物质与灵界的胆识。"
        ],
        'Aphrodite': [
            "魅力并非取悦，而是内在灵魂不经意间的溢出，今日你最闪耀。",
            "情欲如潮汐，顺应它，而非抵抗它，你将抵达温柔的彼岸。",
            "爱是最高级的魔法，当你开始自爱，世界便会爱上你。"
        ]
    };

    function applyWish() {
        const wish = document.getElementById('wish-select').value;
        if(wish === 'protection') selectDrink('Hekate', 80, 20, 60, 70);
        if(wish === 'wealth') selectDrink('St. Cyprian', 40, 40, 70, 80);
        if(wish === 'love') selectDrink('Aphrodite', 30, 85, 10, 40);
    }

    function selectDrink(name, a, s, b, l) {
        currentDrink = name;
        document.getElementById('selected-title').innerText = "当前链接：" + name;
        document.querySelectorAll('.drink-card').forEach(c => c.classList.remove('active'));
        const activeCard = document.getElementById('card-' + name.toLowerCase().replace('st. ', ''));
        if(activeCard) activeCard.classList.add('active');
        ['acid','sweet','bitter','strength'].forEach((id, i) => {
            const vals = [a, s, b, l];
            document.getElementById(id + '-slider').value = vals[i];
            document.getElementById(id + '-value').innerText = vals[i];
        });
    }

    // 纯随机占卜逻辑
    function castOracle() {
        const table = document.getElementById('table-num').value.trim();
        if(!table) { alert('请输入桌号'); return; }

        const drinkOracles = oracles[currentDrink] || oracles['Hekate'];
        const randomResult = drinkOracles[Math.floor(Math.random() * drinkOracles.length)];
        
        document.getElementById('oracle-content').innerText = randomResult;
        document.getElementById('oracle-overlay').style.display = 'flex';
        
        // 保存结果以便随单发送
        window.lastOracle = randomResult;
    }

    function closeOracle() {
        document.getElementById('oracle-overlay').style.display = 'none';
        sendOrder(); // 确认收到神谕后正式下单
    }

    function sendOrder() {
        const table = document.getElementById('table-num').value.trim();
        const a = document.getElementById('acid-value').innerText;
        const s = document.getElementById('sweet-value').innerText;
        const b = document.getElementById('bitter-value').innerText;
        const l = document.getElementById('strength-value').innerText;
        const oracle = window.lastOracle || "无神谕";

        const pushKey = "PDU40747TdeTeirMy2wQe12azBvWvUBOk9S5WjMtt";
        const title = encodeURIComponent(`Crossing神性订单：${table}桌`);
        const desc = encodeURIComponent(`目标:${currentDrink}\n比例:酸${a} 甜${s} 苦${b} 烈${l}\n神谕:${oracle}`);

        const img = new Image();
        img.onload = img.onerror = function() { alert('仪式开启，神谕已封存。'); };
        img.src = `https://api2.pushdeer.com/message/push?pushkey=${pushKey}&text=${title}&desp=${desc}&t=${new Date().getTime()}`;
    }

    ['acid', 'sweet', 'bitter', 'strength'].forEach(id => {
        const s = document.getElementById(id + '-slider');
        const v = document.getElementById(id + '-value');
        s.oninput = function() { v.innerText = this.value; }
    });
</script>
</body>
</html>
